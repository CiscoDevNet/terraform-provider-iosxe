---
name: Object Group
path: /Cisco-IOS-XE-native:native/object-group
no_delete_attributes: true
doc_category: System
attributes:
  - yang_name: Cisco-IOS-XE-object-group:fqdn
    tf_name: fqdn
    type: List
    attributes:
      - yang_name: name
        id: true
        example: FQDN_GROUP_1
      - yang_name: description
        example: My FQDN object group
      - yang_name: group-object
        tf_name: group_objects
        type: Set
        exclude_test: true
        attributes:
          - yang_name: fqdn-group
            tf_name: group_name
            id: true
            example: FQDN_GROUP_2
      - yang_name: pattern
        tf_name: patterns
        type: Set
        attributes:
          - yang_name: fqdn-pattern
            tf_name: fqdn_pattern
            id: true
            example: .*\\.cisco\\.com
  - yang_name: Cisco-IOS-XE-object-group:network
    tf_name: network
    type: List
    attributes:
      - yang_name: name
        id: true
        example: NETWORK_GROUP_1
      - yang_name: obj-Mode-config-network-group/description
        xpath: obj-Mode-config-network-group/description
        tf_name: description
        example: My network object group
      - yang_name: obj-Mode-config-network-group/host
        xpath: obj-Mode-config-network-group/host
        tf_name: hosts
        type: Set
        attributes:
          - yang_name: ipv4-host
            tf_name: ipv4_host
            id: true
            example: 10.1.1.1
      - yang_name: obj-Mode-config-network-group/network_address
        xpath: obj-Mode-config-network-group/network_address
        tf_name: network_addresses
        type: Set
        attributes:
          - yang_name: ipv4_addr
            tf_name: ipv4_address
            id: true
            example: 10.1.2.0
          - yang_name: ipv4_mask
            tf_name: ipv4_mask
            id: true
            example: 255.255.255.0
      - yang_name: obj-Mode-config-network-group/addr-ranges
        xpath: obj-Mode-config-network-group/addr-ranges
        tf_name: address_ranges
        type: Set
        attributes:
          - yang_name: addr-range-start
            tf_name: start
            id: true
            example: 10.1.3.1
          - yang_name: addr-range-end
            tf_name: end
            id: true
            example: 10.1.3.10
      - yang_name: obj-Mode-config-network-group/group-objects
        xpath: obj-Mode-config-network-group/group-objects
        tf_name: group_objects
        type: Set
        exclude_test: true
        attributes:
          - yang_name: network-group
            tf_name: group_name
            id: true
            example: NETWORK_GROUP_2
