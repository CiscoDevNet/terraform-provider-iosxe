---
name: Crypto IKEv2 Profile
path: /Cisco-IOS-XE-native:native/crypto/Cisco-IOS-XE-crypto:ikev2/profile[name=%v]
doc_category: Crypto
attributes:
  - yang_name: name
    example: profile1
  - yang_name: description
    example: My description
  - yang_name: authentication/remote/pre-share
    example: true
  - yang_name: authentication/local/pre-share
    example: true
  - yang_name: identity/local/identity/address-case/address
    xpath: identity/local/address
    tf_name: identity_local_address
    example: 3.4.5.6
    exclude_test: true
  - yang_name: identity/local/identity/key-id-case/key-id
    xpath: identity/local/key-id
    tf_name: identity_local_key_id
    example: key1
  - yang_name: match/inbound-only
    example: true
    exclude_test: true
  - yang_name: match/address/local/ip
    example: 1.2.3.4
  - yang_name: match/fvrf/name
    tf_name: match_fvrf
    example: VRF1
    exclude_test: true
  - yang_name: match/fvrf/any
    example: true
  - yang_name: match/identity/remote/address/ipv4
    tf_name: match_identity_remote_ipv4_addresses
    type: List
    attributes:
      - yang_name: ipv4-address
        tf_name: address
        id: true
        example: 1.2.3.4
      - yang_name: ipv4-mask
        tf_name: mask
        example: 255.255.255.0
  - yang_name: match/identity/remote/address/ipv6-prefix
    tf_name: match_identity_remote_ipv6_prefixes
    example: 2001::1/128
    exclude_test: true
  - yang_name: match/identity/remote/key-ids
    tf_name: match_identity_remote_keys
    example: key1
  - yang_name: keyring/local/name
    tf_name: keyring_local
    example: test
  - yang_name: ivrf
    example: VRF1
  - yang_name: dpd/interval
    delete_parent: true
    example: 10
  - yang_name: dpd/retry
    delete_parent: true
    example: 2
  - yang_name: dpd/query
    delete_parent: true
    example: periodic
  - yang_name: lifetime/seconds
    tf_name: lifetime
    description: IKEv2 SA lifetime in seconds
    example: 28800
  - yang_name: match/address/local/interface-options/interface-choice/Loopback/Loopback
    xpath: match/address/local/interface-options/Loopback
    tf_name: match_address_local_interface_loopback_legacy
    description: Loopback interface. Use this for IOS-XE versions before `17.18.1`.
    type: Int64
    example: 100
    exclude_test: true
  - yang_name: match/address/local/interface-options-local/Loopback
    xpath: match/address/local/interface-options-local/Loopback
    tf_name: match_address_local_interface_loopback
    type: List
    no_augment_config: true
    exclude_test: true
    attributes:
      - yang_name: Loopback
        xpath: Loopback
        tf_name: loopback_number
        id: true
        type: Int64
        no_augment_config: true
        example: 100
  - yang_name: config-exchange/request-1
    tf_name: config_exchange_request
    example: false

test_prerequisites:
  - path: /Cisco-IOS-XE-native:native/crypto/Cisco-IOS-XE-crypto:ikev2/keyring[name=test]
    attributes:
      - name: name
        value: test
  - path: /Cisco-IOS-XE-native:native/vrf/definition[name=VRF1]
    no_delete: true
    attributes:
      - name: name
        value: VRF1
      - name: address-family/ipv4
        value: ""
