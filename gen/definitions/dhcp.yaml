---
name: DHCP
path: /Cisco-IOS-XE-native:native
no_delete: true
doc_category: System
attributes:
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:compatibility/suboption/link-selection
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:compatibility/suboption/link-selection
    tf_name: compatibility_suboption_link_selection
    exclude_test: true
    example: standard
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:compatibility/suboption/server-override
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:compatibility/suboption/server-override
    tf_name: compatibility_suboption_server_override
    exclude_test: true
    example: standard
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/trust-all
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/trust-all
    tf_name: relay_information_trust_all
    example: false
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/option/option-default
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/option/option-default
    tf_name: relay_information_option_default
    example: false
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/option/vpn
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:relay/information/option/vpn
    tf_name: relay_information_option_vpn
    example: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:relay/bootp/ignore
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:relay/bootp/ignore
    tf_name: relay_bootp_ignore
    example: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping
    tf_name: snooping
    example: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/option
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/option
    tf_name: snooping_information_option
    example: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/allow-untrusted
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/allow-untrusted
    tf_name: snooping_information_option_allow_untrusted
    example: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/format/remote-id/remote-id-choice/string/string
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/format/remote-id/string
    tf_name: snooping_information_option_format_remote_id_string
    example: true
    exclude_test: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/format/remote-id/remote-id-choice/hostname/hostname
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/information/options/option/format/remote-id/hostname
    tf_name: snooping_information_option_format_remote_id_hostname
    example: true
    exclude_test: true
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/vlan-list
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/vlan-list
    tf_name: snooping_vlans_legacy
    description: DHCP Snooping vlan list. Use this for versions before `17.14`.
    type: List
    test_tags: [IOSXE1712]
    attributes:
      - yang_name: id
        tf_name: vlan_id
        id: true
        example: 3-4
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/vlan-v2
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:snooping-conf/snooping/vlan-v2
    tf_name: snooping_vlans
    description: DHCP Snooping vlan list. Use this for versions `17.14` and later.
    type: List
    test_tags: [IOSXE1715]
    attributes:
      - yang_name: id
        tf_name: vlan_id
        id: true
        example: 3
  - yang_name: ip/dhcp/Cisco-IOS-XE-dhcp:pool
    xpath: ip/dhcp/Cisco-IOS-XE-dhcp:pool
    tf_name: pools
    type: List
    attributes:
      - yang_name: id
        tf_name: name
        id: true
        example: POOL1
      - yang_name: vrf
        description: Associate this pool with a VRF
        example: VRF1
        exclude_test: true
      - yang_name: domain-name
        example: example.com
      - yang_name: bootfile
        description: Boot file name
        example: boot.cfg
      - yang_name: client-name
        description: Client name
        example: client1
        exclude_test: true
      - yang_name: network/primary-network/number
        tf_name: network_number
        description: Network number
        example: 10.1.1.0
      - yang_name: network/primary-network/mask
        tf_name: network_mask
        description: Network mask
        example: 255.255.255.0
      - yang_name: network/secondary-network
        tf_name: secondary_networks
        type: List
        exclude_test: true
        attributes:
          - yang_name: number
            description: Network number
            example: 10.1.2.0
            id: true
          - yang_name: mask
            description: Network mask
            example: 255.255.255.0
          - yang_name: secondary
            description: Configure as secondary subnet
            example: true
            default_value: true
      - yang_name: host/number
        tf_name: host_number
        description: Client IP address
        example: 10.1.1.100
        exclude_test: true
      - yang_name: host/mask
        tf_name: host_mask
        description: Network mask
        example: 255.255.255.0
        exclude_test: true
      - yang_name: default-router/default-router-list
        tf_name: default_routers
        type: StringList
        description: Default routers
        example: 10.1.1.1
      - yang_name: dns-server/dns-server-list
        tf_name: dns_servers
        type: StringList
        description: DNS servers
        example: 10.1.1.1
      - yang_name: next-server
        tf_name: next_servers
        type: StringList
        description: Next server IP addresses
        example: 10.1.1.1
        exclude_test: true
      - yang_name: lease/lease/lease-value/lease-value/days
        xpath: lease/lease-value/days
        tf_name: lease_days
        description: Lease days
        example: 1
      - yang_name: lease/lease/lease-value/lease-value/hours
        xpath: lease/lease-value/hours
        tf_name: lease_hours
        description: Lease hours
        example: 12
      - yang_name: lease/lease/lease-value/lease-value/minutes
        xpath: lease/lease-value/minutes
        tf_name: lease_minutes
        description: Lease minutes
        example: 30
      - yang_name: lease/lease/infinite/infinite
        xpath: lease/infinite
        tf_name: lease_infinite
        description: Infinite lease
        example: true
        exclude_test: true
      - yang_name: utilization/mark/high/high-value
        tf_name: utilization_mark_high
        description: High utilization mark percentage
        example: 80
        exclude_test: true
      - yang_name: utilization/mark/high/log
        tf_name: utilization_mark_high_log
        description: Log when high utilization is detected
        example: true
        exclude_test: true
      - yang_name: utilization/mark/low/low-value
        tf_name: utilization_mark_low
        description: Low utilization mark percentage
        example: 20
        exclude_test: true
      - yang_name: utilization/mark/low/log
        tf_name: utilization_mark_low_log
        description: Log when low utilization is detected
        example: true
        exclude_test: true
      - yang_name: subnet/prefix-length
        tf_name: subnet_prefix_length
        description: Subnet prefix length
        example: 24
        exclude_test: true
      - yang_name: option/option-range
        tf_name: options
        type: List
        attributes:
          - yang_name: option-range
            tf_name: option_code
            description: DHCP option code
            example: 150
            id: true
          - yang_name: option-range-choice/ascii-case/ascii-new
            xpath: ascii-new
            tf_name: ascii
            description: Data is an NVT ASCII string
            example: 10.1.1.1
          - yang_name: option-range-choice/hex-case/hex-new/hex-line
            xpath: hex-new/hex-line
            tf_name: hex
            description: Data is a hexadecimal string
            exclude_test: true
            example: 0a0101010a010102
          - yang_name: option-range-choice/ip-case/ip-ordered
            xpath: ip-ordered
            tf_name: ip
            type: StringList
            description: Data is one or more IP addresses. Use this for versions `17.15` and later.
            exclude_test: true
            example: 10.1.1.1
          - yang_name: option-range-choice/ip-case/ip-new
            xpath: ip-new
            tf_name: ip_legacy
            type: StringList
            description: Data is one or more IP addresses. Use this for versions before `17.15`.
            exclude_test: true
            example: 10.1.1.1
  - yang_name: ipv6/dhcp/Cisco-IOS-XE-dhcp:pool
    xpath: ipv6/dhcp/Cisco-IOS-XE-dhcp:pool
    tf_name: ipv6_pools
    type: List
    test_tags: [ISR]
    attributes:
      - yang_name: name
        id: true
        example: DHCPv6-PD
      - yang_name: vrf
        description: VRF name
        example: VRF1
        exclude_test: true
      - yang_name: address/prefix
        tf_name: address_prefixes
        type: List
        description: IPv6 address allocation prefix
        exclude_test: true
        attributes:
          - yang_name: ipv6-address
            tf_name: address
            description: IPv6 prefix address
            example: "2001:db8:1::/64"
            id: true
          - yang_name: lifetime/valid-lifetime
            tf_name: valid_lifetime
            description: Valid lifetime in seconds or infinite
            example: 2592000
          - yang_name: lifetime/preferred-lifetime
            tf_name: preferred_lifetime
            description: Preferred lifetime in seconds or infinite
            example: 604800
      - yang_name: prefix-delegation/pool/pool-name
        tf_name: prefix_delegation_pool_name
        description: IPv6 prefix delegation pool name
        example: DHCPv6-PD
      - yang_name: prefix-delegation/pool/lifetime/valid-lifetime
        tf_name: prefix_delegation_pool_valid_lifetime
        description: Valid lifetime in seconds or infinite
        example: 2592000
        exclude_test: true
      - yang_name: prefix-delegation/pool/lifetime/preferred-lifetime
        tf_name: prefix_delegation_pool_preferred_lifetime
        description: Preferred lifetime in seconds or infinite
        example: 604800
        exclude_test: true
      - yang_name: prefix-delegation/pd-prefix
        tf_name: prefix_delegation_prefixes
        type: List
        description: IPv6 prefix delegation prefix
        exclude_test: true
        attributes:
          - yang_name: ipv6-prefix
            tf_name: prefix
            description: IPv6 prefix
            example: "2001:db8:2::/48"
            id: true
          - yang_name: Hex-string
            tf_name: hex_string
            description: DHCPv6 unique identifier (hex)
            example: 00030001AABBCCDDEEFF
          - yang_name: iaid
            description: DHCPv6 IAID (hex)
            example: "00000001"
          - yang_name: lifetime/valid-lifetime
            tf_name: valid_lifetime
            description: Valid lifetime in seconds or infinite
            example: 2592000
          - yang_name: lifetime/preferred-lifetime
            tf_name: preferred_lifetime
            description: Preferred lifetime in seconds or infinite
            example: 604800
      - yang_name: dns-server
        tf_name: dns_servers
        type: StringList
        description: DNS server addresses
        example: "2001:4860:4860::8888"
      - yang_name: domain-names
        type: StringList
        description: Domain names
        example: example.com
      - yang_name: link-address
        tf_name: link_addresses
        type: List
        description: Link-address to match
        exclude_test: true
        attributes:
          - yang_name: address
            description: IPv6 prefix
            example: "2001:db8:3::/64"
            id: true
      - yang_name: bootfile-url
        description: Boot file URL
        example: tftp://[2001:db8::1]/boot.cfg
        exclude_test: true
      - yang_name: option/include-all
        tf_name: option_include_all
        description: Include all DHCPv6 configured options in REPLY
        example: true
        exclude_test: true
      - yang_name: vendor-specific
        tf_name: vendor_specifics
        type: List
        description: Vendor-specific options
        exclude_test: true
        attributes:
          - yang_name: value
            tf_name: enterprise_id
            description: Enterprise ID
            example: 9
            id: true
          - yang_name: suboption
            tf_name: suboptions
            type: List
            attributes:
              - yang_name: number
                description: Suboption number
                example: 1
                id: true
              - yang_name: address
                description: IPv6 address value
                example: "2001:db8::1"
              - yang_name: ascii
                description: ASCII string value
                exclude_test: true
              - yang_name: hex
                description: Hex string value
                exclude_test: true
      - yang_name: import/dns-server
        tf_name: import_dns_server
        description: Import DNS address from interface
        example: true
        exclude_test: true
      - yang_name: import/domain-name
        tf_name: import_domain_name
        description: Import domain name from interface
        example: true
        exclude_test: true
      - yang_name: sntp/address
        tf_name: sntp_addresses
        type: StringList
        description: SNTP server addresses
        exclude_test: true
        example: "2001:db8::123"
      - yang_name: information/refresh/refresh/refresh-value/refresh-value/days
        xpath: information/refresh/refresh-value/days
        tf_name: information_refresh_days
        description: Information refresh days
        exclude_test: true
        example: 1
      - yang_name: information/refresh/refresh/refresh-value/refresh-value/hours
        xpath: information/refresh/refresh-value/hours
        tf_name: information_refresh_hours
        description: Information refresh hours
        exclude_test: true
        example: 12
      - yang_name: information/refresh/refresh/refresh-value/refresh-value/minutes
        xpath: information/refresh/refresh-value/minutes
        tf_name: information_refresh_minutes
        description: Information refresh minutes
        exclude_test: true
        example: 30
      - yang_name: information/refresh/refresh/infinite/infinite
        xpath: information/refresh/infinite
        tf_name: information_refresh_infinite
        description: Infinite information refresh
        example: true
        exclude_test: true

test_prerequisites:
  - path: /Cisco-IOS-XE-native:native/vrf/definition[name=VRF1]
    no_delete: true
    attributes:
      - name: name
        value: VRF1
      - name: address-family/ipv4
        value: ""
      - name: address-family/ipv6
        value: ""
  - path: /Cisco-IOS-XE-native:native/ipv6/local/pool[id=DHCPv6-PD]
    no_delete: true
    attributes:
      - name: id
        value: DHCPv6-PD
      - name: start-address
        value: "2001:db8::/48"
      - name: prefix-length
        value: 64
