---
name: BGP Address Family IPv6 VRF
path: /Cisco-IOS-XE-native:native/router/Cisco-IOS-XE-bgp:bgp[id=%v]/address-family/with-vrf/ipv6[af-name=%s]
skip_minimum_test: true
doc_category: BGP
attributes:
  - yang_name: id
    tf_name: asn
    example: 65000
  - yang_name: af-name
    example: unicast
  - yang_name: vrf
    tf_name: vrfs
    type: List
    attributes:
      - yang_name: name
        example: VRF1
        id: true
      - yang_name: ipv6-unicast/advertise/l2vpn/evpn
        tf_name: ipv6_unicast_advertise_l2vpn_evpn
        example: true
      - yang_name: ipv6-unicast/redistribute-v6/connected
        tf_name: ipv6_unicast_redistribute_connected
        example: true
      - yang_name: ipv6-unicast/redistribute-v6/connected/route-map
        tf_name: ipv6_unicast_redistribute_connected_route_map
        example: RM_BGP6_CONNECTED
      - yang_name: ipv6-unicast/redistribute-v6/connected/metric
        tf_name: ipv6_unicast_redistribute_connected_metric
        example: 100
      - yang_name: ipv6-unicast/redistribute-v6/static
        tf_name: ipv6_unicast_redistribute_static
        example: true
      - yang_name: ipv6-unicast/redistribute-v6/static/route-map
        tf_name: ipv6_unicast_redistribute_static_route_map
        example: RM_BGP6_STATIC
      - yang_name: ipv6-unicast/redistribute-v6/static/metric
        tf_name: ipv6_unicast_redistribute_static_metric
        example: 200
      - yang_name: ipv6-unicast/bgp/router-id/id-choice/interface/interface/interface-choice/Loopback/Loopback
        xpath: ipv6-unicast/bgp/router-id/interface/Loopback
        tf_name: ipv6_unicast_router_id_loopback
        example: 101
      - yang_name: ipv6-unicast/bgp/router-id/id-choice/ip-id/ip-id
        xpath: ipv6-unicast/bgp/router-id/ip-id
        tf_name: ipv6_unicast_router_id_ip
        exclude_test: true
        example: 10.1.1.1
      - yang_name: ipv6-unicast/aggregate-address
        tf_name: ipv6_unicast_aggregate_addresses
        type: List
        attributes:
          - yang_name: ipv6-address
            id: true
            example: 2001:DB8::/32
      - yang_name: ipv6-unicast/network
        tf_name: ipv6_unicast_networks
        type: List
        attributes:
          - yang_name: number
            tf_name: network
            id: true
            example: 2001:1234::/64
          - yang_name: route-map
            example: RM1
          - yang_name: backdoor
            example: true
          - yang_name: evpn
            example: false
      - yang_name: ipv6-unicast/distance/adm-distance
        tf_name: ipv6_unicast_admin_distances
        type: List
        attributes:
          - yang_name: distance
            id: true
            example: 200
          - yang_name: src-ipv6-address
            tf_name: source_ipv6_address
            id: true
            example: 2001:DB8::/48
          - yang_name: prefix-list-name
            example: 100
            exclude_test: true
      - yang_name: ipv6-unicast/distance/bgp/extern-as
        tf_name: ipv6_unicast_distance_bgp_external
        example: 20
      - yang_name: ipv6-unicast/distance/bgp/internal-as
        tf_name: ipv6_unicast_distance_bgp_internal
        example: 200
      - yang_name: ipv6-unicast/distance/bgp/local
        example: 200
      - yang_name: ipv6-unicast/maximum-paths/ebgp
        tf_name: ipv6_unicast_maximum_paths_ebgp
        example: 2
      - yang_name: ipv6-unicast/maximum-paths/ibgp/ibgp-choice/max/max
        tf_name: ipv6_unicast_maximum_paths_ibgp
        xpath: ipv6-unicast/maximum-paths/ibgp/max
        example: 2
test_prerequisites:
  - path: /Cisco-IOS-XE-native:native/ipv6
    no_delete: true
    attributes:
      - name: unicast-routing
        value: ""
  - path: /Cisco-IOS-XE-native:native/vrf/definition[name=VRF1]
    no_delete: true
    attributes:
      - name: name
        value: VRF1
      - name: rd
        value: 1:1
      - name: address-family/ipv4
        value: ""
      - name: address-family/ipv6
        value: ""
    dependencies: [0]
  - path: /Cisco-IOS-XE-native:native/router/Cisco-IOS-XE-bgp:bgp[id=65000]
    attributes:
      - name: id
        value: 65000
    dependencies: [1]
  - path: /Cisco-IOS-XE-native:native/interface/Loopback[name=101]
    attributes:
      - name: name
        value: 101
      - name: ip/address/primary/address
        value: 22.22.22.22
      - name: ip/address/primary/mask
        value: 255.255.255.255
      - name: vrf/forwarding
        value: VRF1
    dependencies: [1]
