---
name: Interface OSPFv3
path: /Cisco-IOS-XE-native:native/interface/%s[name=%v]/Cisco-IOS-XE-ospfv3:ospfv3
augment_path: /Cisco-IOS-XE-native:native/interface/GigabitEthernet[name=%v]/Cisco-IOS-XE-ospfv3:ospfv3
doc_category: OSPF
attributes:
  - yang_name: type
    tf_name: type
    description: Interface type
    type: String
    reference: true
    enum_values:
      - GigabitEthernet
      - TwoGigabitEthernet
      - FiveGigabitEthernet
      - TenGigabitEthernet
      - TwentyFiveGigE
      - FortyGigabitEthernet
      - FiftyGigabitEthernet
      - HundredGigE
      - TwoHundredGigE
      - FourHundredGigE
      - Loopback
      - Vlan
      - Port-channel
      - Port-channel-subinterface/Port-channel
      - Tunnel
    example: Loopback
  - yang_name: name
    example: 1
  - yang_name: network-type/network-type-choice/broadcast/broadcast
    xpath: network-type/broadcast
    tf_name: network_type_broadcast
    example: false
  - yang_name: network-type/network-type-choice/non-broadcast/non-broadcast
    xpath: network-type/non-broadcast
    tf_name: network_type_non_broadcast
    example: false
  - yang_name: network-type/network-type-choice/point-to-multipoint/point-to-multipoint
    xpath: network-type/point-to-multipoint
    tf_name: network_type_point_to_multipoint
    example: false
  - yang_name: network-type/network-type-choice/point-to-point/point-to-point
    xpath: network-type/point-to-point
    tf_name: network_type_point_to_point
    example: true
  - yang_name: bfd
    example: true
  - yang_name: cost-config/cost-options/value/value
    xpath: cost-config/value
    tf_name: cost
    example: 1000
  - yang_name: dead-interval
    example: 30
  - yang_name: hello-interval
    example: 5
  - yang_name: mtu-ignore
    example: true
  - yang_name: priority
    example: 10
  - yang_name: process-id
    tf_name: process_ids
    type: List
    attributes:
      - yang_name: id
        id: true
        example: 1
      - yang_name: ipv4/area
        tf_name: ipv4_areas
        type: List
        attributes:
          - yang_name: id
            id: true
            example: 0
      - yang_name: ipv6/area
        tf_name: ipv6_areas
        type: List
        attributes:
          - yang_name: id
            id: true
            example: 0

test_prerequisites:
  - path: /Cisco-IOS-XE-native:native/ipv6
    no_delete: true
    attributes:
      - name: unicast-routing
        value: ""
  - path: /Cisco-IOS-XE-native:native/router/Cisco-IOS-XE-ospfv3:ospfv3[id=1]
    attributes:
      - name: address-family/ipv4/unicast
        value: ""
      - name: address-family/ipv6/unicast
        value: ""
    dependencies: [0]
  - path: /Cisco-IOS-XE-native:native/interface/Loopback[name=1]
    attributes:
      - name: name
        value: 1
      - name: ipv6/enable
        value: ""
    dependencies: [1]
