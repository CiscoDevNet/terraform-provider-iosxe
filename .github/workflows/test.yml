# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "README.md"
  push:
    paths-ignore:
      - "README.md"

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: hashicorp/setup-terraform@v3
      - run: pip install yamale
      - run: yamale -s gen/schema/schema.yaml gen/definitions/
      - run: go mod download
      - run: go generate
      - run: git diff --exit-code
      - run: go build -v .

  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - "1.0.*"
          - "1.5.*"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      # - env:
      #     TF_ACC: "1"
      #     IOSXE_USERNAME: ${{ secrets.IOSXE_USERNAME }}
      #     IOSXE_PASSWORD: ${{ secrets.IOSXE_PASSWORD }}
      #     IOSXE_URL: ${{ secrets.IOSXE_URL }}
      #   run: go test -v -cover -timeout 45m ./internal/provider/
      #   timeout-minutes: 45

  notify:
    name: Webex Notification
    needs: [build, test]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Determine overall result
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.test.result }}" != "failure" ]]; then
            echo "PIPELINE_STATUS=success" >> $GITHUB_ENV
          else
            echo "PIPELINE_STATUS=failure" >> $GITHUB_ENV
          fi

      - name: Send Webex Notification
        uses: qsnyder/action-wxt@master
        env:
          TOKEN: ${{ secrets.WEBEX_TOKEN }}
          ROOMID: ${{ secrets.WEBEX_ROOM_ID }}
          MESSAGE: |
            ## ${{ env.PIPELINE_STATUS == 'success' && '✅' || '❌' }} NaC IOS-XE Provider Pipeline ${{ env.PIPELINE_STATUS == 'success' && 'Passed' || 'Failed' }}

            ---
            **Build Information:**
            * **Pipeline:** ${{ github.repository }}
            * **Run:** [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            * **Branch:** `${{ github.ref_name }}`
            * **Event:** ${{ github.event_name }}

            **Git Information:**
            * **Commit:** [`${{ env.SHORT_SHA }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — _${{ github.event.head_commit.message }}_
            * **Author:** ${{ github.event.head_commit.author.name }}

            **Quick Links:**
            * [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) | [Commit Diff](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
