# Configures GitHub's automatically generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - "ignore-for-release"
    authors:
      - "dependabot[bot]"

  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - "breaking-change"

    - title: "🚀 New Features"
      labels:
        - "feature"
        - "enhancement"

    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"

    - title: "📄 Documentation"
      labels:
        - "documentation"

    - title: "🛠️ Internal & Maintenance"
      labels:
        - "refactor"
        - "tech-debt"
        - "chore"
        - "dependencies"

    - title: "⚙️ Other Changes"
      labels:
        - "*"
